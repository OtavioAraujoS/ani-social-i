services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: ani-social-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    env_file:
      - .env
    restart: always
